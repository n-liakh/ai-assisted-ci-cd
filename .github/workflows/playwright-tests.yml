name: Playwright Tests

on:
  pull_request:
    branches: [ main ]

# Minimal read-only permissions
permissions:
  contents: read

# Cancel any in-progress run for the same PR
concurrency:
  group: playwright-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true

    steps:
      # Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Node.js LTS with Yarn cache
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      # Install dependencies using the frozen lockfile
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      # Install Playwright browsers along with system-level dependencies
      - name: Install Playwright browsers
        run: yarn playwright install --with-deps

      # Run all Playwright tests in parallel
      - name: Run Playwright tests
        run: yarn playwright test

      # Upload the HTML report (always, even on failure)
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30

      # Upload Playwright traces for failed test debugging (always)
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/**/trace*.zip
          retention-days: 30

      # Notify Microsoft Teams on workflow failure
      - name: Notify Teams on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "@type": "MessageCard",
            "@context": "https://schema.org/extensions",
            "summary": "Playwright Tests Failed",
            "themeColor": "FF0000",
            "title": "❌ Playwright Tests Failed",
            "sections": [
              {
                "facts": [
                  { "name": "PR Title", "value": "${{ github.event.pull_request.title }}" },
                  { "name": "Author", "value": "${{ github.event.pull_request.user.login }}" },
                  { "name": "Branch", "value": "${{ github.head_ref }}" },
                  { "name": "Workflow Run", "value": "[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" }
                ]
              }
            ]
          }' "${{ secrets.TEAMS_WEBHOOK_URL }}"
